<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles/global.css">
    <title>Workouts</title>
    <script type="module" src="./js/workouts.js"></script>
</head>

<body class="bg-white text-lg-black">

    <header class="py-4 border-b flex flex-col gap-4 items-center justify-between px-4 md:flex-row">
        <img id="logo" src="./assets/logo-light.png" alt="Logo do site" class="h-12">
        <a href="./index.html"
            class="inline-flex items-center text-lg font-medium text-gray-500 hover:text-gray-900 transition-colors">
            <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
                </path>
            </svg>
            Voltar
        </a>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 relative">
        <button id="openModalBtn"
            class="bg-gray-200 absolute right-10 py-2 px-4 border-2 border-black border-b-4 rounded-2xl text-base active:border-b-2 active:border-r-2 active:translate-x-[2px] active:translate-y-[2px]">
            Adicionar Treino
        </button>

        <div id="workouts" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-16">
        </div>

        <div id="modalOverlay" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <form id="addTaskForm" class="w-full max-w-md bg-white border-2 border-black rounded-2xl p-5 grid grid-cols-2 gap-4" action="">
                <div class="col-span-2 flex justify-between items-center border-b pb-2 mb-2">
                    <h2 class="text-lg font-bold text-gray-900">Novo Treino</h2>
                    <button type="button" id="closeModalBtn" class="text-gray-500 hover:text-black font-bold text-xl">✕</button>
                </div>

                <div class="col-span-2">
                    <label class="block text-sm font-bold mb-1">Nome do Treino</label>
                    <input type="text" id="workoutName" class="w-full border border-black rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-black">
                </div>

                <div>
                    <label class="block text-sm font-bold mb-1">Data do Treino</label>
                    <input type="date" id="workoutDate" class="w-full border border-black rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-black">
                </div>

                <div>
                    <label class="block text-sm font-bold mb-1">Carga</label>
                    <div class="flex items-center gap-1">
                        <input type="number" id="workoutWeight" class="w-full border border-black rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-black">
                        <span class="text-sm font-bold">kg</span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-1">Repetições</label>
                    <input type="number" id="workoutReps" class="w-full border border-black rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-black">
                </div>

                <div class="flex items-center gap-2 pt-6 pl-1">
                    <input type="checkbox" id="workoutUntilFailure" class="w-4 h-4 accent-black cursor-pointer rounded border-black focus:ring-0">
                    <label for="workoutUntilFailure" class="text-sm font-bold cursor-pointer select-none">Até a falha</label>
                </div>

                <div class="col-span-2">
                    <label class="block text-sm font-bold mb-1">Observações</label>
                    <textarea id="workoutObs" rows="3" class="w-full border border-black rounded-lg px-3 py-1.5 text-sm resize-none focus:outline-none focus:ring-1 focus:ring-black"></textarea>
                </div>

                <div class="col-span-2 mt-2 flex justify-end">
                    <button type="submit" class="bg-gray-200 px-5 py-2 border-2 border-b-4 border-r-4 border-black rounded-xl text-sm font-bold transition-all duration-75 active:border-b-2 active:border-r-2 active:translate-x-[2px] active:translate-y-[2px]">
                        Adicionar Treino
                    </button>
                </div>
            </form>
        </div>
    </main>

</body>

</html>
