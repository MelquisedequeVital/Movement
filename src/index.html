<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Muscular</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles/global.css">
    
</head>
<body class="bg-white  text-lg-black">
    <header class="py-4 border-b flex flex-col gap-4 items-center justify-between px-4 md:flex-row">
        <img id="logo" src="./assets/logo-light.png" alt="Logo do site" class="h-12">        
    </header>

    <main class="flex flex-col items-center max-w-5xl mx-auto py-6 px-6">
        <h1 class="flex text-center md:text-4xl text-2xl font-semibold mb-10 md:mb-16 ">Selecione a parte do corpo que quer treinar</h1>
        <div class="flex justify-center flex-col md:flex-row items-center gap-12 w-full">
            <object class="w-full md:w-1/2 h-[80vh] svg" id="svg-front" data="./assets/front-body.svg" type="image/svg+xml"></object>
            <object class="w-full md:w-1/2 h-[80vh] svg" id="svg-back" data="./assets/back-body.svg" type="image/svg+xml"></object>
        </div>
        
    </main>
    <script type="module" src="./js/svg.js"></script>
    
        

</body>
</html>
